<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Personal Expense Tracker"/>
  <title>{% block title %}Expense Tracker{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
  />
  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}"/>

  {% block head %}{% endblock %}
</head>
<body>

<!-- ── Navbar ─────────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-dark navbar-expand-lg px-3 mb-4" id="main-navbar">
  <a class="navbar-brand fw-bold" href="/">
    <i class="bi bi-wallet2 me-2"></i>Expense<span class="brand-accent">Tracker</span>
  </a>
  <span class="text-secondary small ms-auto d-none d-md-block">
    Personal Finance Tool
  </span>
</nav>

<!-- ── Page content ───────────────────────────────────────────────────────── -->
<main class="container-xl pb-5">
  {% block content %}{% endblock %}
</main>

<!-- ── Toast container ────────────────────────────────────────────────────── -->
<div id="toast-container" aria-live="polite" aria-atomic="true"></div>

<!-- Bootstrap 5 JS -->
<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
</script>

{% block scripts %}{% endblock %}
</body>
</html>
